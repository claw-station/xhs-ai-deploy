services:
  - type: web
    name: xhs-ai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ZHIPU_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
